    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap');
        body { 
            margin: 0; background: #020617; 
            font-family: 'Plus Jakarta Sans', sans-serif;

        }
        .glass {
            background: rgba(15, 23, 42, 0.8);

        .cell:active { transform: scale(0.9); }
        .x-color { color: #f87171; text-shadow: 0 0 15px rgba(248, 113, 113, 0.6); }

        .winning-cell {
            animation: clear-anim 0.5s forwards;
        }

        @keyframes clear-anim {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); filter: brightness(2); }
            100% { transform: scale(0); opacity: 0; }
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <!-- HEADER STATUS -->
    <div id="game-status-bar" class="w-full max-w-md hidden mb-4">
        <div class="glass p-4 rounded-3xl flex justify-between items-center relative overflow-hidden">
            <div class="z-10">
                <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Room: <span id="room-id-display" class="text-white">-</span></p>
                <p id="turn-info" class="text-xs font-black mt-1 uppercase italic">Menunggu...</p>
            </div>
            <div class="text-right z-10">
                <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Ronde <span id="current-round">1</span></p>
                <p class="text-sm font-black mt-1"><span class="x-color">X: <span id="score-x">0</span></span> | <span class="o-color">O: <span id="score-o">0</span></span></p>
            </div>
        </div>
        <button onclick="surrender()" class="w-full mt-2 bg-red-500/10 border border-red-500/20 py-2 rounded-xl text-[10px] font-black text-red-500 uppercase tracking-[0.3em] active:bg-red-500/30 transition-all">
            SURRENDER (MENYERAH)
        </button>
    </div>

    <!-- MAIN MENU -->
    <div id="menu" class="w-full max-w-md space-y-6 mt-10">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black italic tracking-tighter">XOX <span class="text-indigo-500">PRO</span></h1>
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.4em] mt-2 italic">Singapore Server Connected</p>
        </div>

        <div id="setup-area" class="space-y-4">
            <div class="glass p-6 rounded-[2.5rem] space-y-4">
                <p class="text-xs font-bold text-center text-slate-400 uppercase tracking-widest">Host Game Baru</p>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-slate-500 ml-2">GRID (3-10)</label>
                        <input id="grid-size" type="number" value="3" min="3" max="10" class="bg-slate-900 w-full p-4 rounded-2xl text-center font-bold border border-slate-800 outline-none focus:border-indigo-500">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-slate-500 ml-2">RONDE (3-10)</label>
                        <input id="round-limit" type="number" value="3" min="3" max="10" class="bg-slate-900 w-full p-4 rounded-2xl text-center font-bold border border-slate-800 outline-none focus:border-indigo-500">
                    </div>
                </div>
                <button onclick="createRoom()" class="w-full bg-indigo-600 p-5 rounded-3xl font-black text-white active:scale-95 transition-all shadow-xl shadow-indigo-600/20 italic">BUAT ROOM</button>
            </div>

            <div class="text-center py-2 text-slate-700 font-bold text-xs uppercase tracking-widest">Atau</div>

            <div class="glass p-6 rounded-[2.5rem] space-y-4">
                <p class="text-xs font-bold text-center text-slate-400 uppercase tracking-widest">Gabung Lawan</p>
                <input id="join-room-id" type="text" placeholder="MASUKKAN KODE ROOM..." class="bg-slate-900 w-full p-5 rounded-3xl text-center font-black border border-slate-800 outline-none focus:border-indigo-500 tracking-[0.5em]">
                <button onclick="joinRoom()" class="w-full bg-white text-slate-950 p-5 rounded-3xl font-black active:scale-95 transition-all italic">GABUNG SEKARANG</button>
            </div>
        </div>
    </div>

    <!-- GAME BOARD -->
    <div id="game-board-container" class="hidden w-full max-w-md mt-4">
        <div id="grid" class="glass p-2 rounded-3xl grid gap-2"></div>
        <p class="text-[9px] text-slate-500 text-center mt-4 uppercase tracking-widest font-bold">
            <span id="win-condition-text">Dapatkan 3 untuk poin</span>
        </p>
    </div>

    <!-- OVERLAY -->
    <div id="overlay" class="fixed inset-0 z-[100] bg-slate-950/95 hidden flex-col items-center justify-center p-8 text-center">
        <h2 id="overlay-title" class="text-4xl font-black italic text-white mb-2 uppercase">WAITING...</h2>
        <p id="overlay-desc" class="text-slate-400 font-bold text-xs uppercase tracking-widest mb-10">Beri tahu lawan kode ini:</p>
        <div id="overlay-content" class="text-7xl font-black text-indigo-500 mb-10 tracking-widest">0000</div>
        <div id="overlay-loader" class="w-12 h-1 bg-indigo-500/20 rounded-full overflow-hidden">
            <div class="w-full h-full bg-indigo-500 animate-[loading_2s_infinite]"></div>
        </div>
    </div>

    <script>
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        const firebaseConfig = {
            apiKey: "AIzaSyBfyoYAGe0DEL20DZAWZxPTfAl-Z-p6XYg",
            authDomain: "huda-smm.firebaseapp.com",
            projectId: "huda-smm",
            databaseURL: "https://huda-smm-default-rtdb.asia-southeast1.firebasedatabase.app",
            appId: "1:188041108472:web:50ee121f1fe68897d7940d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myId = Math.random().toString(36).substring(7);
        let mySymbol = '';
        let currentRoomId = null;
        let isMyTurn = false;
        let localBoard = [];
        let winReq = 3; 

        function createRoom() {
            const size = parseInt(document.getElementById('grid-size').value);
            const rounds = parseInt(document.getElementById('round-limit').value);
            if(size < 3 || size > 10) return alert("Huda, ukuran minimal 3 maksimal 10!");
            
            const roomId = Math.floor(1000 + Math.random() * 9000).toString();
            currentRoomId = roomId;
            winReq = size >= 5 ? 5 : 3;

            const roomData = {
                id: roomId, host: myId, player2: null,
                config: { size, rounds, winReq },
                board: Array(size * size).fill(''),
                turn: 'X', round: 1, scores: { X: 0, O: 0 },
                status: 'waiting', starter: 'X', lastAction: 'init'
            };

            db.ref('xox_rooms/' + roomId).set(roomData).then(() => {
                mySymbol = 'X';
                showOverlay("ROOM READY", "Lawan harus masukkan kode:", roomId);
                listenToRoom(roomId);
            });
        }

        function joinRoom() {
            const roomId = document.getElementById('join-room-id').value.trim();
            if(!roomId) return;

            db.ref('xox_rooms/' + roomId).once('value', snap => {
                const data = snap.val();
                if(!data) return alert("Room tidak ada!");
                if(data.player2 && data.player2 !== myId) return alert("Room penuh!");

                mySymbol = 'O'; 
                currentRoomId = roomId;
                winReq = data.config.winReq;
                db.ref('xox_rooms/' + roomId).update({ player2: myId, status: 'playing' });
                listenToRoom(roomId);
            });
        }

        function listenToRoom(roomId) {
            db.ref('xox_rooms/' + roomId).on('value', snap => {
                const data = snap.val();
                if(!data) {
                    alert("Lawan menyerah atau room ditutup!");
                    location.reload();
                    return;
                }

                if(data.status === 'finished') {
                    alert(`GAME SELESAI!\nX: ${data.scores.X} | O: ${data.scores.O}`);
                    db.ref('xox_rooms/' + roomId).remove();
                    location.reload();
                    return;
                }

                localBoard = data.board;
                document.getElementById('room-id-display').innerText = roomId;
                document.getElementById('current-round').innerText = data.round;
                document.getElementById('score-x').innerText = data.scores.X;
                document.getElementById('score-o').innerText = data.scores.O;
                document.getElementById('win-condition-text').innerText = `Dapatkan ${data.config.winReq} simbol sejajar untuk poin`;
                
                document.getElementById('menu').classList.add('hidden');
                document.getElementById('game-status-bar').classList.remove('hidden');
                document.getElementById('game-board-container').classList.remove('hidden');

                if(data.status === 'playing') {
                    document.getElementById('overlay').style.display = 'none';
                    isMyTurn = (data.turn === mySymbol);
                    const turnEl = document.getElementById('turn-info');
                    turnEl.innerText = isMyTurn ? `GILIRAN KAMU (${mySymbol})` : `GILIRAN LAWAN (${data.turn})`;
                    turnEl.className = isMyTurn ? "text-xs font-black mt-1 uppercase italic text-green-400" : "text-xs font-black mt-1 uppercase italic text-red-400";
                }

                renderBoard(data.config.size);
            });
        }

        function renderBoard(size) {
            const grid = document.getElementById('grid');
            grid.style.gridTemplateColumns = `repeat(${size}, minmax(0, 1fr))`;
            grid.innerHTML = '';
            
            localBoard.forEach((val, idx) => {
                const cell = document.createElement('div');
                const fontSize = size > 6 ? 'text-sm' : 'text-2xl';
                cell.className = `cell glass rounded-xl ${fontSize} bg-slate-900/50 ${val === 'X' ? 'x-color' : 'o-color'}`;
                cell.innerText = val;
                if(!val && isMyTurn) cell.onclick = () => makeMove(idx);
                grid.appendChild(cell);
            });
        }

        function makeMove(idx) {
            if(!isMyTurn || localBoard[idx]) return;
            
            localBoard[idx] = mySymbol;
            const size = localBoard.length ** 0.5; // asumsi square
            const winCells = checkWin(idx, size, winReq);

            if(winCells) {
                // Ada yang menang deretan! Clear & Score
                winCells.forEach(i => localBoard[i] = ''); // Kosongkan deretan
                
                db.ref('xox_rooms/' + currentRoomId).once('value', snap => {
                    const data = snap.val();
                    let newScores = {...data.scores};
                    newScores[mySymbol] += 1; // Poin bertambah

                    // Cek apakah papan penuh atau lanjut ronde
                    let nextTurn = mySymbol === 'X' ? 'O' : 'X';
                    
                    // Jika poin sudah mencapai batas ronde atau papan dikosongkan secara manual, bisa lanjut ronde
                    // Tapi di sini kita biarkan papan tetap terbuka sampai ronde benar-benar pindah
                    
                    db.ref('xox_rooms/' + currentRoomId).update({
                        board: localBoard,
                        scores: newScores,
                        turn: nextTurn
                    });
                });
            } else {
                // Tidak ada deretan, cuma ganti turn
                const nextTurn = mySymbol === 'X' ? 'O' : 'X';
                
                // Cek kalau papan penuh tapi tidak ada yang menang deretan (Draw/Reset)
                if(!localBoard.includes('')) {
                    db.ref('xox_rooms/' + currentRoomId).once('value', snap => {
                        const data = snap.val();
                        if(data.round >= data.config.rounds) {
                            db.ref('xox_rooms/' + currentRoomId).update({ status: 'finished' });
                        } else {
                            // Pindah ronde
                            const nextRound = data.round + 1;
                            const nextStart = nextRound === 2 ? 'O' : (Math.random() > 0.5 ? 'X' : 'O');
                            db.ref('xox_rooms/' + currentRoomId).update({
                                board: Array(data.config.size * data.config.size).fill(''),
                                round: nextRound,
                                turn: nextStart
                            });
                        }
                    });
                } else {
                    db.ref('xox_rooms/' + currentRoomId).update({
                        board: localBoard,
                        turn: nextTurn
                    });
                }
            }
        }

        function checkWin(idx, size, req) {
            const symbol = localBoard[idx];
            const r = Math.floor(idx / size);
            const c = idx % size;

            const directions = [
                [0, 1],  // Horizontal
                [1, 0],  // Vertikal
                [1, 1],  // Diagonal \
                [1, -1]  // Diagonal /
            ];

            for (let [dr, dc] of directions) {
                let cells = [idx];
                // Cek ke satu arah
                for (let i = 1; i < req; i++) {
                    let nr = r + dr * i, nc = c + dc * i;
                    if (nr >= 0 && nr < size && nc >= 0 && nc < size && localBoard[nr * size + nc] === symbol) {
                        cells.push(nr * size + nc);
                    } else break;
                }
                // Cek ke arah lawan
                for (let i = 1; i < req; i++) {
                    let nr = r - dr * i, nc = c - dc * i;
                    if (nr >= 0 && nr < size && nc >= 0 && nc < size && localBoard[nr * size + nc] === symbol) {
                        cells.push(nr * size + nc);
                    } else break;
                }

                if (cells.length >= req) return cells;
            }
            return null;
        }

        function surrender() {
            if(confirm("Huda, yakin mau menyerah? Lawan akan otomatis menang.")) {
                db.ref('xox_rooms/' + currentRoomId).remove();
                location.reload();
            }
        }

        function showOverlay(title, desc, content) {
            document.getElementById('overlay-title').innerText = title;
            document.getElementById('overlay-desc').innerText = desc;
            document.getElementById('overlay-content').innerText = content;
            document.getElementById('overlay').style.display = 'flex';
        }

        window.addEventListener('resize', () => {
            const data = document.getElementById('grid-size').value;
            if(currentRoomId) renderBoard(parseInt(data));
        });
    </script>
</body>
</html>
