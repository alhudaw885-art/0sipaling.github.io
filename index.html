    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HUDA SHOOTER - CLOUD EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK Legacy (Compat) agar mudah dijalankan langsung di satu file HTML -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap');
        body { 
            margin: 0; 
            background: #020617; 
            overflow: hidden; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            touch-action: none;
            user-select: none;
        }
        canvas { display: block; }
        .ui-layer {
            position: absolute;
            top: 20px;

            box-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
            transition: all 0.2s;
        }
        .btn-start:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <!-- UI LAYER -->
    <div class="ui-layer">
        <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-[0.2em] mb-1">Live Score</p>
        <h1 id="score-val" class="text-5xl font-black italic tracking-tighter">0</h1>
        
        <!-- Leaderboard Box -->
        <div class="mt-6 p-4 glass rounded-[2rem] w-52 shadow-2xl">
            <div class="flex items-center gap-2 mb-3">
                <span class="text-xs">🏆</span>
                <p class="text-[9px] font-bold text-slate-300 uppercase tracking-widest">Global Top 5</p>
            </div>
            <div id="leaderboard-list" class="space-y-2">
                <p class="text-[9px] text-slate-500 italic">Menghubungkan ke Firebase...</p>
            </div>
        </div>
    </div>

    <!-- START/OVERLAY SCREEN -->
    <div id="overlay" class="fixed inset-0 bg-slate-950/90 backdrop-blur-md z-50 flex items-center justify-center flex-col p-8 text-center">
        <div class="mb-8">
            <h2 class="text-5xl font-black text-white italic tracking-tighter mb-2">HUDA SHOOTER</h2>
            <p class="text-indigo-400 font-bold text-[10px] uppercase tracking-[0.3em]">Cloud Database System</p>
        </div>
        
        <div class="w-full max-w-xs space-y-4">
            <input id="player-name" type="text" placeholder="NAMA KAMU..." 
                class="bg-slate-900 border border-slate-800 p-5 rounded-2xl text-center text-white font-black outline-none focus:border-indigo-500 w-full uppercase tracking-widest shadow-inner">
            
            <button onclick="startGame()" class="btn-start w-full italic uppercase tracking-wider text-sm">
                MULAI PERTEMPURAN
            </button>
        </div>
        
        <p class="mt-8 text-slate-600 text-[9px] uppercase font-bold tracking-widest">Gunakan klik/tap untuk menembak bola</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // --- DATA FIREBASE TERBARU DARI SCREENSHOT KAMU ---
        const firebaseConfig = {
            apiKey: "AIzaSyBfyoYAGe0DEL20DZAWZxPTfAl-Z-p6XYg",
            authDomain: "huda-smm.firebaseapp.com",
            projectId: "huda-smm",
            storageBucket: "huda-smm.firebasestorage.app",
            messagingSenderId: "188041108472",
            appId: "1:188041108472:web:50ee121f1fe68897d7940d",
            databaseURL: "https://huda-smm-default-rtdb.firebaseio.com" // URL Database Anda
        };

        // Inisialisasi Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-val');
        const boardEl = document.getElementById('leaderboard-list');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let gameActive = false;
        let projectiles = [];
        let enemies = [];
        let animationId;

        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 12,
            color: '#6366f1'
        };

        // Class Peluru
        class Projectile {
            constructor(x, y, radius, color, velocity) {
                this.x = x; this.y = y; this.radius = radius;
                this.color = color; this.velocity = velocity;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                this.draw();
                this.x += this.velocity.x;
                this.y += this.velocity.y;
            }
        }

        // Class Musuh (Bola)
        class Enemy {
            constructor(x, y, radius, color, velocity) {
                this.x = x; this.y = y; this.radius = radius;
                this.color = color; this.velocity = velocity;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.lineWidth = 2;
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.stroke();
                ctx.fill();
            }
            update() {
                this.draw();
                this.x += this.velocity.x;
                this.y += this.velocity.y;
            }
        }

        function animate() {
            animationId = requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(2, 6, 23, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Player Core
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2, false);
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fill();
            ctx.shadowBlur = 0;

            projectiles.forEach((p, index) => {
                p.update();
                if(p.x + p.radius < 0 || p.x - p.radius > canvas.width || p.y + p.radius < 0 || p.y - p.radius > canvas.height) {
                    projectiles.splice(index, 1);
                }
            });

            enemies.forEach((enemy, index) => {
                enemy.update();
                const dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                
                // Cek Tabrakan Player (Game Over)
                if(dist - enemy.radius - player.radius < 1) {
                    cancelAnimationFrame(animationId);
                    gameOver();
                }

                // Cek Tabrakan Peluru
                projectiles.forEach((p, pIndex) => {
                    const d = Math.hypot(p.x - enemy.x, p.y - enemy.y);
                    if(d - enemy.radius - p.radius < 1) {
                        enemies.splice(index, 1);
                        projectiles.splice(pIndex, 1);
                        score += 100;
                        scoreEl.innerText = score;
                    }
                });
            });
        }

        function spawnEnemies() {
            if(!gameActive) return;
            const radius = Math.random() * 15 + 10;
            let x, y;
            if(Math.random() < 0.5) {
                x = Math.random() < 0.5 ? 0 - radius : canvas.width + radius;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? 0 - radius : canvas.height + radius;
            }
            const angle = Math.atan2(canvas.height/2 - y, canvas.width/2 - x);
            const speed = 1.2 + (score / 5000); // Semakin tinggi skor, semakin cepat bola
            const velocity = { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed };
            enemies.push(new Enemy(x, y, radius, `hsl(${Math.random() * 360}, 70%, 50%)`, velocity));
            
            setTimeout(spawnEnemies, 1000 - (score/200)); // Semakin tinggi skor, bola semakin banyak muncul
        }

        window.addEventListener('mousedown', (e) => {
            if(!gameActive) return;
            const angle = Math.atan2(e.clientY - canvas.height/2, e.clientX - canvas.width/2);
            const velocity = { x: Math.cos(angle) * 7, y: Math.sin(angle) * 7 };
            projectiles.push(new Projectile(canvas.width/2, canvas.height/2, 4, '#ffffff', velocity));
        });

        function startGame() {
            const name = document.getElementById('player-name').value.trim();
            if(!name) return alert("Huda, isi namamu dulu ya!");
            
            localStorage.setItem('huda_shooter_name', name);
            document.getElementById('overlay').style.display = 'none';
            
            score = 0;
            scoreEl.innerText = 0;
            projectiles = [];
            enemies = [];
            gameActive = true;
            
            animate();
            spawnEnemies();
        }

        function gameOver() {
            gameActive = false;
            const name = localStorage.getItem('huda_shooter_name');
            
            // SIMPAN KE FIREBASE
            db.ref('scores').push({
                name: name.toUpperCase(),
                score: score,
                date: Date.now()
            });

            setTimeout(() => {
                alert("Waduh! Game Over.\nSkor Akhir: " + score);
                document.getElementById('overlay').style.display = 'flex';
            }, 100);
        }

        // FUNGSI UNTUK MONITORING LEADERBOARD REALTIME DARI CLOUD
        function monitorLeaderboard() {
            db.ref('scores').on('value', snap => {
                const data = snap.val();
                if(!data) {
                    boardEl.innerHTML = `<p class="text-[9px] text-slate-600">Belum ada skor global.</p>`;
                    return;
                }

                // Sorting data dari yang terbesar
                const allScores = Object.values(data);
                allScores.sort((a, b) => b.score - a.score);
                
                // Ambil Top 5
                const top5 = allScores.slice(0, 5);
                
                boardEl.innerHTML = top5.map((s, i) => `
                    <div class="flex justify-between items-center bg-white/5 p-2 rounded-xl border border-white/5">
                        <div class="flex items-center gap-2">
                            <span class="text-[8px] text-indigo-500 font-black">${i+1}</span>
                            <span class="text-[10px] font-bold text-slate-300 truncate w-24">${s.name}</span>
                        </div>
                        <span class="text-[10px] font-black text-white italic">${s.score}</span>
                    </div>
                `).join('');
            });
        }

        // Load nama yang tersimpan sebelumnya
        const saved = localStorage.getItem('huda_shooter_name');
        if(saved) document.getElementById('player-name').value = saved;

        // Jalankan monitor leaderboard
        monitorLeaderboard();
        
        // Handle Resize layar
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
        });
    </script>
</body>
</html>
