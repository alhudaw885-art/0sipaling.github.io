    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBfyoYAGe0DEL20DZAWZxPTfAl-Z-p6XYg",
            authDomain: "huda-smm.firebaseapp.com",
            databaseURL: "https://huda-smm-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "huda-smm",
            appId: "1:188041108472:web:50ee121f1fe68897d7940d"
        };
        
        // Cek inisialisasi
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        let myId = "player_" + Math.random().toString(36).substr(2, 5);
        let mySymbol = '';
        let currentRoomId = null;
        let isMyTurn = false;
        let localBoard = [];

        async function createRoom() {
            const btn = document.getElementById('btn-create');
            btn.disabled = true;
            btn.innerText = "MENGHUBUNGKAN...";

            const size = parseInt(document.getElementById('grid-size').value);
            const rounds = parseInt(document.getElementById('round-limit').value);
            const roomId = Math.floor(1000 + Math.random() * 9000).toString();
            const winReq = size >= 5 ? 5 : 3;

            const roomData = {
                id: roomId,
                host: myId,
                player2: "",
                config: { size, rounds, winReq },
                board: Array(size * size).fill(""),
                turn: 'X',
                round: 1,
                scores: { X: 0, O: 0 },
                status: 'waiting'
            };

            try {
                await db.ref('xox_rooms/' + roomId).set(roomData);
                mySymbol = 'X';
                currentRoomId = roomId;
                document.getElementById('ov-content').innerText = roomId;
                document.getElementById('overlay').style.display = 'flex';
                listenToRoom(roomId);
            } catch (e) {
                alert("Gagal koneksi ke Singapore. Coba lagi!");
                btn.disabled = false;
                btn.innerText = "BUAT ROOM & KODE";
            }
        }

        async function joinRoom() {
            const roomId = document.getElementById('join-room-id').value.trim();
            if(!roomId) return alert("Huda, isi kodenya dulu!");

            const btn = document.getElementById('btn-join');
            btn.innerText = "MENCARI...";

            db.ref('xox_rooms/' + roomId).once('value', async (snap) => {
                const data = snap.val();
                if(!data) {
                    alert("Kode salah atau Room sudah mati!");
                    btn.innerText = "GABUNG SEKARANG";
                    return;
                }
                
                mySymbol = 'O';
                currentRoomId = roomId;
                await db.ref('xox_rooms/' + roomId).update({
                    player2: myId,
                    status: 'playing'
                });
                listenToRoom(roomId);
            });
        }

        function listenToRoom(roomId) {
            db.ref('xox_rooms/' + roomId).on('value', snap => {
                const data = snap.val();
                if(!data) {
                    location.reload();
                    return;
                }

                if(data.status === 'playing') {
                    document.getElementById('overlay').style.display = 'none';
                    document.getElementById('menu').classList.add('hidden');
                    document.getElementById('game-status-bar').classList.remove('hidden');
                    document.getElementById('game-board-container').classList.remove('hidden');
                    
                    isMyTurn = data.turn === mySymbol;
                    localBoard = data.board;
                    
                    document.getElementById('room-id-display').innerText = roomId;
                    document.getElementById('current-round').innerText = data.round;
                    document.getElementById('score-x').innerText = data.scores.X;
                    document.getElementById('score-o').innerText = data.scores.O;
                    document.getElementById('win-cond').innerText = `Dapatkan ${data.config.winReq} Sejajar`;

                    const turnEl = document.getElementById('turn-info');
                    turnEl.innerText = isMyTurn ? `GILIRANMU (${mySymbol})` : `LAWANKU (${data.turn})`;
                    turnEl.className = isMyTurn ? "text-xs font-black mt-1 text-green-400 italic" : "text-xs font-black mt-1 text-red-400 italic";
                    
                    renderBoard(data.config.size);
                }
            });
        }

        function renderBoard(size) {
            const grid = document.getElementById('grid');
            grid.style.gridTemplateColumns = `repeat(${size}, minmax(0, 1fr))`;
            grid.innerHTML = '';
            
            localBoard.forEach((val, idx) => {
                const cell = document.createElement('div');
                const fontClass = size > 5 ? 'text-sm' : 'text-3xl';
                cell.className = `cell glass rounded-xl ${fontClass} ${val === 'X' ? 'x-color' : 'o-color'}`;
                cell.innerText = val;
                if(!val && isMyTurn) {
                    cell.onclick = () => sendMove(idx, size);
                }
                grid.appendChild(cell);
            });
        }

        async function sendMove(idx, size) {
            if(!isMyTurn || localBoard[idx]) return;
            
            localBoard[idx] = mySymbol;
            const req = size >= 5 ? 5 : 3;
            const winCells = checkWin(idx, size, req);
            
            db.ref('xox_rooms/' + currentRoomId).once('value', async snap => {
                const data = snap.val();
                let nextTurn = mySymbol === 'X' ? 'O' : 'X';
                let scores = {...data.scores};
                let board = [...localBoard];

                if(winCells) {
                    scores[mySymbol]++;
                    winCells.forEach(i => board[i] = ""); // Clear yang menang
                }

                // Cek ganti ronde jika papan penuh
                if(!board.includes("")) {
                    if(data.round < data.config.rounds) {
                        board = Array(size * size).fill("");
                        const nextRound = data.round + 1;
                        const starter = nextRound === 2 ? 'O' : (Math.random() > 0.5 ? 'X' : 'O');
                        await db.ref('xox_rooms/' + currentRoomId).update({
                            board: board,
                            round: nextRound,
                            turn: starter,
                            scores: scores
                        });
                        return;
                    } else {
                        alert(`PERMAINAN BERAKHIR!\nSkor Akhir - X: ${scores.X} | O: ${scores.O}`);
                        db.ref('xox_rooms/' + currentRoomId).remove();
                        return;
                    }
                }

                db.ref('xox_rooms/' + currentRoomId).update({
                    board: board,
                    turn: nextTurn,
                    scores: scores
                });
            });
        }

        function checkWin(idx, size, req) {
            const symbol = localBoard[idx];
            const r = Math.floor(idx / size), c = idx % size;
            const dirs = [[0,1],[1,0],[1,1],[1,-1]];
            for(let [dr, dc] of dirs) {
                let cells = [idx];
                for(let i=1; i<req; i++) {
                    let nr=r+dr*i, nc=c+dc*i;
                    if(nr>=0 && nr<size && nc>=0 && nc<size && localBoard[nr*size+nc]===symbol) cells.push(nr*size+nc);
                    else break;
                }
                for(let i=1; i<req; i++) {
                    let nr=r-dr*i, nc=c-dc*i;
                    if(nr>=0 && nr<size && nc>=0 && nc<size && localBoard[nr*size+nc]===symbol) cells.push(nr*size+nc);
                    else break;
                }
                if(cells.length >= req) return cells;
            }
            return null;
        }

        function surrender() {
            if(confirm("Menyerah? Kamu akan keluar dari game.")) {
                db.ref('xox_rooms/' + currentRoomId).remove();
                location.reload();
            }
        }
    </script>
