```html
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HUDA SHOOTER - TOTAL SCORE SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap');
        body { 
            margin: 0; background: #020617; overflow: hidden; 
            font-family: 'Plus Jakarta Sans', sans-serif; touch-action: none;
        }
        canvas { display: block; }
        .glass {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .rank-card {
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .my-rank {
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.4);
        }
    </style>
</head>
<body>

    <!-- UI LAYER -->
    <div class="absolute top-6 left-6 text-white pointer-events-none z-10 w-full pr-12">
        <div class="flex justify-between items-start">
            <div>
                <p id="player-tag" class="text-[10px] font-bold text-indigo-400 uppercase tracking-[0.3em] mb-1 italic">Total Accumulation</p>
                <h1 id="score-val" class="text-7xl font-black italic tracking-tighter">0</h1>
            </div>
            
            <div class="p-5 glass rounded-[2.5rem] w-64 shadow-2xl pointer-events-auto">
                <div class="flex items-center justify-between mb-4">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Global Top 5</p>
                    <div class="flex items-center gap-2">
                        <span class="text-[9px] font-bold text-green-500 uppercase">Live</span>
                        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    </div>
                </div>
                <div id="leaderboard-list" class="space-y-2">
                    <!-- Data Leaderboard -->
                </div>
            </div>
        </div>
    </div>

    <!-- OVERLAY -->
    <div id="overlay" class="fixed inset-0 bg-slate-950/98 z-50 flex items-center justify-center flex-col p-8 text-center">
        <div id="game-over-ui" class="hidden mb-6">
            <p class="text-indigo-400 font-bold uppercase tracking-[0.5em] mb-2 text-sm">Skor Baru</p>
            <h3 id="last-score" class="text-6xl font-black text-white italic mb-4">0</h3>
            <p id="total-info" class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-8"></p>
        </div>

        <div id="welcome-ui" class="mb-10">
            <h2 class="text-5xl font-black text-white italic tracking-tighter">HUDA SHOOTER</h2>
            <p class="text-indigo-500 font-bold text-[10px] uppercase tracking-[0.4em] mt-2 italic">Sistem Akumulasi Skor Aktif</p>
        </div>

        <div class="w-full max-w-xs space-y-4">
            <div id="input-area">
                <input id="player-name" type="text" placeholder="MASUKKAN NAMA..." 
                    class="bg-slate-900 border border-slate-800 p-5 rounded-3xl text-center text-white font-black outline-none focus:border-indigo-500 w-full uppercase tracking-widest">
            </div>
            
            <div id="user-info" class="hidden py-4 bg-white/5 rounded-3xl border border-white/5 mb-4">
                <p class="text-slate-500 text-[10px] uppercase font-bold tracking-widest mb-1">Akun Terdeteksi:</p>
                <p id="display-name" class="text-white font-black text-2xl uppercase italic tracking-tighter"></p>
                <p id="my-total-display" class="text-indigo-400 text-[10px] font-bold mt-1 uppercase"></p>
                <button onclick="logout()" class="mt-4 text-[9px] text-slate-600 font-bold uppercase hover:text-white">Ganti Nama</button>
            </div>

            <button onclick="startGame()" id="btn-play" class="w-full bg-indigo-600 p-5 rounded-3xl text-white font-black shadow-xl shadow-indigo-600/20 active:scale-95 transition-all uppercase italic tracking-widest">
                MAIN SEKARANG
            </button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBfyoYAGe0DEL20DZAWZxPTfAl-Z-p6XYg",
            authDomain: "huda-smm.firebaseapp.com",
            projectId: "huda-smm",
            databaseURL: "https://huda-smm-default-rtdb.asia-southeast1.firebasedatabase.app",
            appId: "1:188041108472:web:50ee121f1fe68897d7940d"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-val');
        const boardEl = document.getElementById('leaderboard-list');
        const overlay = document.getElementById('overlay');
        const playerTag = document.getElementById('player-tag');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let gameActive = false;
        let projectiles = [];
        let enemies = [];
        let animationId;
        const player = { x: canvas.width/2, y: canvas.height/2, radius: 18, color: '#6366f1' };

        function checkUser() {
            const user = localStorage.getItem('huda_acc_user');
            if(user) {
                document.getElementById('input-area').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('display-name').innerText = user;
                document.getElementById('btn-play').innerText = "GAS LAGI";
                playerTag.innerText = "PLAYER: " + user.toUpperCase();
                
                // Ambil total skor saat ini
                db.ref('players/' + user.toUpperCase()).once('value', snap => {
                    const data = snap.val();
                    if(data) document.getElementById('my-total-display').innerText = "Total Skor: " + data.totalScore;
                });
            }
        }

        function logout() {
            localStorage.removeItem('huda_acc_user');
            location.reload();
        }

        class Projectile {
            constructor(x, y, radius, color, velocity) {
                this.x = x; this.y = y; this.radius = radius;
                this.color = color; this.velocity = velocity;
            }
            update() {
                this.x += this.velocity.x; this.y += this.velocity.y;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill();
            }
        }

        class Enemy {
            constructor(x, y, radius, color, velocity) {
                this.x = x; this.y = y; this.radius = radius;
                this.color = color; this.velocity = velocity;
            }
            update() {
                this.x += this.velocity.x; this.y += this.velocity.y;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill();
            }
        }

        function animate() {
            if(!gameActive) return;
            animationId = requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(2, 6, 23, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color; ctx.fill();

            projectiles.forEach((p, i) => {
                p.update();
                if(p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) projectiles.splice(i, 1);
            });

            enemies.forEach((enemy, index) => {
                enemy.update();
                if(Math.hypot(player.x - enemy.x, player.y - enemy.y) - enemy.radius - player.radius < 1) {
                    cancelAnimationFrame(animationId);
                    gameOver();
                }
                projectiles.forEach((p, pIndex) => {
                    if(Math.hypot(p.x - enemy.x, p.y - enemy.y) - enemy.radius - p.radius < 1) {
                        enemies.splice(index, 1);
                        projectiles.splice(pIndex, 1);
                        score += 100;
                        scoreEl.innerText = score;
                    }
                });
            });
        }

        function spawn() {
            if(!gameActive) return;
            const radius = Math.random() * 20 + 10;
            const angle = Math.random() * Math.PI * 2;
            const x = canvas.width/2 + Math.cos(angle) * (canvas.width);
            const y = canvas.height/2 + Math.sin(angle) * (canvas.width);
            const dir = Math.atan2(canvas.height/2 - y, canvas.width/2 - x);
            enemies.push(new Enemy(x, y, radius, `hsl(${Math.random()*360}, 70%, 60%)`, {x:Math.cos(dir)*3.5, y:Math.sin(dir)*3.5}));
            setTimeout(spawn, 800);
        }

        window.addEventListener('mousedown', (e) => {
            if(!gameActive) return;
            const angle = Math.atan2(e.clientY - canvas.height/2, e.clientX - canvas.width/2);
            projectiles.push(new Projectile(canvas.width/2, canvas.height/2, 6, '#fff', {x:Math.cos(angle)*15, y:Math.sin(angle)*15}));
        });

        function startGame() {
            let name = localStorage.getItem('huda_acc_user');
            if(!name) {
                name = document.getElementById('player-name').value.trim();
                if(!name) return alert("Isi namamu dulu Huda!");
                localStorage.setItem('huda_acc_user', name);
            }
            overlay.style.display = 'none';
            score = 0; scoreEl.innerText = 0; projectiles = []; enemies = [];
            gameActive = true;
            animate(); spawn();
        }

        function gameOver() {
            gameActive = false;
            const name = localStorage.getItem('huda_acc_user').toUpperCase();
            
            // PROSES AKUMULASI (TAMBAH SKOR)
            const playerRef = db.ref('players/' + name);
            playerRef.once('value', snap => {
                const currentData = snap.val();
                const oldTotal = currentData ? currentData.totalScore : 0;
                const newTotal = oldTotal + score;

                playerRef.set({
                    name: name,
                    totalScore: newTotal,
                    lastUpdate: Date.now()
                });

                document.getElementById('total-info').innerText = "Total Skor Kamu Jadi: " + newTotal;
            });

            document.getElementById('last-score').innerText = score;
            document.getElementById('game-over-ui').classList.remove('hidden');
            document.getElementById('welcome-ui').classList.add('hidden');
            overlay.style.display = 'flex';
            checkUser();
        }

        function listen() {
            db.ref('players').on('value', snap => {
                const data = snap.val();
                if(!data) return;

                const sorted = Object.values(data).sort((a,b) => b.totalScore - a.totalScore).slice(0, 5);
                const myName = localStorage.getItem('huda_acc_user')?.toUpperCase();

                boardEl.innerHTML = sorted.map((s, i) => `
                    <div class="rank-card flex justify-between items-center p-3 rounded-2xl ${s.name === myName ? 'my-rank' : ''}">
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] font-black text-indigo-400">${i+1}</span>
                            <span class="text-[11px] font-bold text-white truncate w-24 uppercase">${s.name}</span>
                        </div>
                        <span class="text-[11px] font-black text-white italic tracking-tighter">${s.totalScore.toLocaleString()}</span>
                    </div>
                `).join('');
            });
        }

        checkUser();
        listen();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            player.x = canvas.width/2; player.y = canvas.height/2;
        });
    </script>
</body>
</html>
